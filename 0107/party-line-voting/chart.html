<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congress Has Stopped Deliberating — The Statecraft Blueprint</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #eef0f5;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 16px;
    }
    #root { width: 100%; max-width: 820px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip,
            ReferenceLine, ResponsiveContainer } = Recharts;

    const TSB = {
      bg:         "#eef0f5",
      primary:    "#3d3f7c",
      accent:     "#a63232",
      gridLine:   "#d8dbe6",
      labelMuted: "#8a8fa8",
      labelDark:  "#2a2c4a",
      white:      "#ffffff",
    };

    const data = [
      {year:1969,value:31.1},{year:1970,value:27.1},{year:1971,value:37.8},
      {year:1972,value:27.1},{year:1973,value:41.8},{year:1974,value:29.4},
      {year:1975,value:48.4},{year:1976,value:35.9},{year:1977,value:42.2},
      {year:1978,value:33.2},{year:1979,value:47.3},{year:1980,value:37.6},
      {year:1981,value:37.4},{year:1982,value:36.4},{year:1983,value:55.6},
      {year:1984,value:47.1},{year:1985,value:61.0},{year:1986,value:56.5},
      {year:1987,value:63.7},{year:1988,value:47.0},{year:1989,value:56.3},
      {year:1990,value:49.1},{year:1991,value:55.1},{year:1992,value:64.5},
      {year:1993,value:65.5},{year:1994,value:61.8},{year:1995,value:73.2},
      {year:1996,value:56.4},{year:1997,value:50.4},{year:1998,value:55.5},
      {year:1999,value:47.3},{year:2000,value:43.2},{year:2001,value:40.2},
      {year:2002,value:43.3},{year:2003,value:51.7},{year:2004,value:47.0},
      {year:2005,value:49.0},{year:2006,value:54.5},{year:2007,value:62.0},
      {year:2008,value:53.3},{year:2009,value:50.9},{year:2010,value:40.0},
      {year:2011,value:75.8},{year:2012,value:72.8},{year:2013,value:68.6},
      {year:2014,value:72.6},{year:2015,value:75.1},{year:2016,value:73.4},
      {year:2017,value:76.0},{year:2018,value:58.6},{year:2019,value:68.0},
      {year:2020,value:69.8},{year:2021,value:63.2},{year:2022,value:53.1},
      {year:2025,value:85.3},
    ];

    const callouts = [
      { num: "27%", label: "of House votes split\nthe parties in 1970",      color: TSB.primary },
      { num: "85%", label: "of all votes in 2025 —\nhighest ever recorded",  color: TSB.accent  },
      { num: "74%", label: "avg. member unity\nscore in 1970",               color: TSB.primary },
      { num: "94%", label: "avg. member unity\nscore in 2025",               color: TSB.accent  },
    ];

    function CustomTooltip({ active, payload, label }) {
      if (!active || !payload || !payload.length) return null;
      return (
        <div style={{
          background: TSB.white, border: `1px solid ${TSB.gridLine}`,
          borderRadius: 4, padding: "10px 14px",
          boxShadow: "0 2px 8px rgba(0,0,0,0.08)",
        }}>
          <p style={{ color: TSB.labelMuted, margin: "0 0 4px", fontSize: 11, letterSpacing: "0.05em" }}>
            {label}
          </p>
          <p style={{ color: TSB.primary, margin: 0, fontSize: 15, fontWeight: "bold" }}>
            {payload[0].value.toFixed(1)}%
          </p>
          <p style={{ color: TSB.labelMuted, margin: "2px 0 0", fontSize: 11 }}>
            of all House votes were party-line
          </p>
        </div>
      );
    }

    function Chart() {
      return (
        <div style={{ background: TSB.bg, padding: "36px 40px 28px" }}>

          <div style={{ fontSize: 10, letterSpacing: "0.18em", color: TSB.accent,
                        textTransform: "uppercase", marginBottom: 12 }}>
            The Statecraft Blueprint
          </div>

          <h2 style={{ color: TSB.labelDark, fontSize: 20, fontWeight: "normal",
                       margin: "0 0 6px", lineHeight: 1.3 }}>
            Congress Has Stopped Deliberating
          </h2>

          <p style={{ color: TSB.labelMuted, fontSize: 13, margin: "0 0 28px", lineHeight: 1.5 }}>
            Percentage of all House votes that split the parties, 1969–2025.
            In 1970, that number was 27%. In 2025, it reached 85% — the highest ever recorded.
          </p>

          <ResponsiveContainer width="100%" height={340}>
            <AreaChart data={data} margin={{ top: 10, right: 16, bottom: 0, left: 0 }}>
              <defs>
                <linearGradient id="tsbGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%"  stopColor={TSB.primary} stopOpacity={0.12} />
                  <stop offset="95%" stopColor={TSB.primary} stopOpacity={0.01} />
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke={TSB.gridLine} vertical={false} />
              <XAxis
                dataKey="year"
                tick={{ fill: TSB.labelMuted, fontSize: 11 }}
                tickLine={false}
                axisLine={{ stroke: TSB.gridLine }}
                ticks={[1970,1975,1980,1985,1990,1995,2000,2005,2010,2015,2020,2025]}
              />
              <YAxis
                domain={[20, 90]}
                ticks={[20,30,40,50,60,70,80,90]}
                tick={{ fill: TSB.labelMuted, fontSize: 11 }}
                tickLine={false}
                axisLine={false}
                tickFormatter={v => `${v}%`}
              />
              <Tooltip content={<CustomTooltip />} />
              <ReferenceLine
                x={1974}
                stroke={TSB.accent}
                strokeDasharray="4 3"
                strokeWidth={1.5}
                label={{ value: "1974", position: "insideTopRight",
                         fill: TSB.accent, fontSize: 10, dy: -8, dx: 4 }}
              />
              <Area
                type="monotone"
                dataKey="value"
                stroke={TSB.primary}
                strokeWidth={2.5}
                fill="url(#tsbGrad)"
                dot={false}
                activeDot={{ r: 5, fill: TSB.primary, stroke: TSB.white, strokeWidth: 2 }}
              />
            </AreaChart>
          </ResponsiveContainer>

          {/* Callout stats */}
          <div style={{ display: "flex", marginTop: 24,
                        borderTop: `1px solid ${TSB.gridLine}`, paddingTop: 20 }}>
            {callouts.map((c, i) => (
              <div key={i} style={{
                flex: 1,
                paddingRight: 20,
                borderRight: i < 3 ? `1px solid ${TSB.gridLine}` : "none",
                paddingLeft: i > 0 ? 20 : 0,
              }}>
                <div style={{ fontSize: 26, color: c.color, fontWeight: "bold",
                              lineHeight: 1, letterSpacing: "-0.02em" }}>
                  {c.num}
                </div>
                <div style={{ fontSize: 11, color: TSB.labelMuted, marginTop: 5, lineHeight: 1.4,
                              whiteSpace: "pre-line" }}>
                  {c.label}
                </div>
              </div>
            ))}
          </div>

          {/* Source */}
          <p style={{ marginTop: 16, fontSize: 10, color: TSB.labelMuted, lineHeight: 1.5,
                      borderTop: `1px solid ${TSB.gridLine}`, paddingTop: 12 }}>
            Sources: Brookings Institution, Vital Statistics on Congress, Ch. 8, Tables 8-3 &amp; 8-4
            (1969–2022); CQ Roll Call Annual Vote Studies (2023–2025). A party-line vote is one where
            a majority of Democrats opposed a majority of Republicans. Full data and methodology:
            <a href="sources.md" style={{ color: TSB.primary, marginLeft: 4 }}>
              sources.md
            </a>
          </p>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Chart />);
  </script>
</body>
</html>
