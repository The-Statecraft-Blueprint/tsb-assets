<text x="70" y="84" class="title">Fewer Laws. More Pages.</text>
<text x="70" y="114" class="subtitle">As Congress passes less legislation, each law has grown far longer. Bills have become</text>
<text x="70" y="134" class="subtitle">simultaneously rarer and harder to read.</text>

<text x="70" y="534" class="foot">The decline in laws is sometimes read as leaner, simpler government. The page counts show otherwise:</text>
<text x="70" y="552" class="foot">roughly 7–10&#215; longer than in the late 1940s. Whatever that is, it is not simpler.</text>
<text x="70" y="576" class="footnote">* 118th pages compiled from GPO GovInfo (Brookings figures pending); that Congress was unusually unproductive. Raw page</text>
<text x="70" y="592" class="footnote">counts understate the trend &#8212; a modern page of statute holds an estimated 30–40% more text than one printed before 1983.</text>
<text x="790" y="634" class="src" text-anchor="end">Source: Brookings Institution, Vital Statistics on Congress, Table 6-4 (Statutes at Large pages); 118th from GPO GovInfo &#183; The Statecraft Blueprint</text>
