<text x="575" y="334" class="why-navy" text-anchor="middle">Majorities agree &#8594; bipartisan vote</text>

<!-- definition box -->
<rect x="70" y="362" width="720" height="158" fill="#e0e2ee"/>
<rect x="70" y="362" width="3" height="158" fill="#9a3324"/>
<text x="90" y="384" class="defhead">THE DEFINITION</text>
<text x="90" y="402" class="quote">&#8220;A party-line vote is one on which a majority of Republicans</text>
<text x="90" y="418" class="quote">vote one way and a majority of Democrats vote another.&#8221;</text>
<text x="90" y="436" class="quote">&#8220;A bipartisan vote is one in which a majority of Republicans</text>
<text x="90" y="452" class="quote">and a majority of Democrats vote the same way.&#8221;</text>
<text x="90" y="470" class="citation">&#8212; Congressional Record (1956), Vol. 102, Pt. 11, p. 15069 &#183; same threshold used by CQ Roll Call since 1953</text>
<text x="90" y="488" class="plain">Plain-language version: as long as each party&#8217;s majority ends up on opposite sides, individual</text>
<text x="90" y="504" class="plain">members crossing over doesn&#8217;t change whether the vote counts as party-line.</text>

<!-- stat row -->
<line x1="430" y1="532" x2="430" y2="574" class="statdivider"/>
<text x="90" y="558" class="statnum-red">&#8805;50%</text>
<text x="90" y="576" class="statlabel">share of each party&#8217;s votes needed on each side</text>
<text x="460" y="558" class="statnum-navy">1953</text>
<text x="460" y="576" class="statlabel">year CQ&#8217;s party-unity-vote series began</text>

<!-- source footer -->
<line x1="70" y1="596" x2="790" y2="596" class="hrule"/>
<text x="70" y="616" class="src">Source: Congressional Record (1956), Vol. 102, Pt. 11, p. 15069; CQ Roll Call, &#8220;Vote Watch Methodology&#8221; (updated 2023).</text>
