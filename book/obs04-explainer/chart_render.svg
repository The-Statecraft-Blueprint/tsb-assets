<text x="70" y="80" class="title">What Counts as a &#8220;Party-Line Vote&#8221;</text>
<text x="70" y="106" class="subtitle">The test isn&#8217;t unanimity within a party &#8212; it&#8217;s whether each party&#8217;s majority lands on opposite sides.</text>
